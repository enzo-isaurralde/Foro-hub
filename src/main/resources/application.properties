spring.application.name=Foro-Challenge

# MySQL
spring.datasource.url=jdbc:mysql://${RT_HOST}:3306/${RT_DATABASE}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${RT_USER}
spring.datasource.password=${RT_PASSWORD}

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

# Desactivar Flyway temporalmente
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# Configuraciˇn de logging
jwt.secret=${JWT_SECRET:MiClaveSuperSecretaDeAlMenos32Caracteres123!}
