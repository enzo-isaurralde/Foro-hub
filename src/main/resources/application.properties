spring.application.name=Foro-Challenge

# Configuración de la base de datos MySQL
spring.datasource.url=jdbc:mysql://${RT_HOST}:3306/${RT_DATABASE}?useSSL=false&serverTimezone=UTC
spring.datasource.username=${RT_USER}
spring.datasource.password=${RT_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuración de JPA/Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Dialecto de Hibernate para MySQL (Hibernate 7 usa MySQLDialect en lugar de MySQL8Dialect)
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Configuración de Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
